<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race Night – Director</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root { --bg:#060910; --panel:#0D1220; --border:rgba(255,255,255,0.08); --purple:#9B59F5; --green:#2ECC71; --red:#E74C3C; --amber:#F39C12; --ice:#7EC8E3; }
  body { background:var(--bg); color:#fff; font-family:'Inter',sans-serif; min-height:100vh; padding:24px; }

  header { display:flex; align-items:center; justify-content:space-between; padding-bottom:24px; border-bottom:1px solid var(--border); margin-bottom:28px; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:3px; }
  .logo span { color:var(--purple); }
  .pill { display:flex; align-items:center; gap:8px; padding:6px 14px; border-radius:99px; font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; border:1px solid; }
  .pill.idle { border-color:rgba(255,255,255,0.15); color:rgba(255,255,255,0.35); }
  .pill.live { border-color:var(--green); color:var(--green); }
  .pill .dot { width:7px; height:7px; border-radius:50%; background:currentColor; }
  .pill.live .dot { animation:blink 1s infinite; }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:18px; }
  .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; margin-bottom:18px; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:22px; }
  .card-lbl { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:14px; font-weight:600; }

  .score-card { text-align:center; }
  .score-num { font-family:'Bebas Neue',sans-serif; font-size:68px; line-height:1; margin-bottom:4px; }
  .score-num.w { color:#fff; } .score-num.p { color:var(--purple); }
  .score-nm { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; opacity:0.4; }
  .bar-bg { height:5px; background:rgba(255,255,255,0.06); border-radius:4px; overflow:hidden; margin-top:14px; }
  .bar-fill { height:100%; border-radius:4px; transition:width .5s ease; }
  .bar-w { background:linear-gradient(90deg,rgba(255,255,255,.2),#fff); }
  .bar-p { background:linear-gradient(90deg,rgba(155,89,245,.3),var(--purple)); }
  .pct { font-size:11px; font-family:'JetBrains Mono',monospace; opacity:0.25; margin-top:5px; }

  .stat-row { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
  .stat-row:last-child { border:none; }
  .sk { font-size:13px; color:rgba(255,255,255,0.4); }
  .sv { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; }

  .timer-big { font-family:'Bebas Neue',sans-serif; font-size:58px; line-height:1; }
  .timer-sub { font-size:11px; letter-spacing:2px; color:rgba(255,255,255,0.25); margin-top:4px; text-transform:uppercase; }

  .dur-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
  .dur-btn { padding:8px 16px; border-radius:8px; border:1px solid rgba(255,255,255,0.12); background:transparent; color:rgba(255,255,255,0.45); font-size:14px; font-weight:700; cursor:pointer; transition:all .1s; }
  .dur-btn.on, .dur-btn:hover { border-color:var(--purple); color:var(--purple); background:rgba(155,89,245,0.1); }

  .btn-row { display:flex; gap:12px; flex-wrap:wrap; }
  .btn { padding:14px 28px; border-radius:12px; border:none; font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; cursor:pointer; flex:1; min-width:140px; transition:all .12s; }
  .btn:disabled { opacity:0.3; cursor:not-allowed; transform:none !important; }
  .btn:not(:disabled):hover { transform:translateY(-2px); }
  .btn:not(:disabled):active { transform:scale(0.97); }
  .btn-start { background:var(--green); color:#000; }
  .btn-stop { background:var(--red); color:#fff; }
  .btn-reset { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.6); border:1px solid rgba(255,255,255,0.12) !important; }

  .log { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px; height:150px; overflow-y:auto; font-family:'JetBrains Mono',monospace; font-size:11px; color:rgba(255,255,255,0.3); }
  .le { padding:2px 0; }
  .le.info{color:#7EC8E3} .le.ok{color:var(--green)} .le.warn{color:var(--amber)} .le.err{color:var(--red)}

  .conn-badge { display:inline-flex; align-items:center; gap:6px; font-size:11px; padding:4px 10px; border-radius:6px; }
  .conn-badge.on { background:rgba(46,204,113,0.1); color:var(--green); border:1px solid rgba(46,204,113,0.2); }
  .conn-badge.off { background:rgba(231,76,60,0.1); color:var(--red); border:1px solid rgba(231,76,60,0.2); }

  .url-box { background:var(--bg); border:1px solid rgba(155,89,245,0.2); border-radius:8px; padding:12px; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--purple); word-break:break-all; margin-top:10px; }
</style>
</head>
<body>
<header>
  <div class="logo">RACE NIGHT <span>DIRECTOR</span></div>
  <div style="display:flex;gap:12px;align-items:center">
    <div class="conn-badge off" id="conn-badge">● OFFLINE</div>
    <div class="pill idle" id="pill"><div class="dot"></div><span id="pill-txt">IDLE</span></div>
  </div>
</header>

<div class="grid2">
  <div class="card score-card">
    <div class="card-lbl">Team White · Upper Bowl</div>
    <div class="score-num w" id="d-upper">0</div>
    <div class="score-nm">WHITE</div>
    <div class="bar-bg"><div class="bar-fill bar-w" id="bw" style="width:0%"></div></div>
    <div class="pct" id="pw">0%</div>
  </div>
  <div class="card score-card">
    <div class="card-lbl">Team Purple · Lower Bowl</div>
    <div class="score-num p" id="d-lower">0</div>
    <div class="score-nm">PURPLE</div>
    <div class="bar-bg"><div class="bar-fill bar-p" id="bp" style="width:0%"></div></div>
    <div class="pct" id="pp">0%</div>
  </div>
</div>

<div class="grid3">
  <div class="card">
    <div class="card-lbl">Timer</div>
    <div class="timer-big" id="d-timer">—</div>
    <div class="timer-sub" id="d-timer-sub">not started</div>
  </div>
  <div class="card">
    <div class="card-lbl">Live Stats</div>
    <div class="stat-row"><div class="sk">Total taps</div><div class="sv" id="d-total">0</div></div>
    <div class="stat-row"><div class="sk">Leader</div><div class="sv" id="d-leader">—</div></div>
    <div class="stat-row"><div class="sk">Margin</div><div class="sv" id="d-margin">—</div></div>
    <div class="stat-row"><div class="sk">Connected</div><div class="sv" id="d-clients">—</div></div>
  </div>
  <div class="card">
    <div class="card-lbl">Fan App URL</div>
    <div style="font-size:12px;color:rgba(255,255,255,0.35);margin-bottom:6px">Share via QR or PA</div>
    <div class="url-box" id="fan-url">—</div>
  </div>
</div>

<div class="card" style="margin-bottom:18px">
  <div class="card-lbl">Game Controls</div>
  <div class="dur-row" id="dur-row">
    <button class="dur-btn" onclick="setDur(30,this)">30s</button>
    <button class="dur-btn on" onclick="setDur(60,this)">60s</button>
    <button class="dur-btn" onclick="setDur(90,this)">90s</button>
    <button class="dur-btn" onclick="setDur(120,this)">2 min</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-start" id="btn-start" onclick="startGame()">▶ START RACE</button>
    <button class="btn btn-stop" id="btn-stop" onclick="stopGame()" disabled>■ END RACE</button>
    <button class="btn btn-reset" onclick="resetGame()">↺ RESET</button>
  </div>
</div>

<div class="card">
  <div class="card-lbl" style="display:flex;align-items:center;gap:8px">
    <span id="log-dot" style="width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.15);display:inline-block"></span>
    Director Log
  </div>
  <div class="log" id="log"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let duration = 60;
let timerInterval = null;
let gameActive = false;
let prevUpper = 0, prevLower = 0, prevTime = Date.now();

document.getElementById('fan-url').textContent = window.location.origin + '/';

function log(msg, type='') {
  const box = document.getElementById('log');
  const t = new Date().toLocaleTimeString('en-CA', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const el = document.createElement('div');
  el.className = 'le ' + type;
  el.textContent = `[${t}] ${msg}`;
  box.insertBefore(el, box.firstChild);
  document.getElementById('log-dot').style.background = type === 'err' ? '#E74C3C' : type === 'ok' ? '#2ECC71' : '#7EC8E3';
}

socket.on('connect', () => {
  document.getElementById('conn-badge').className = 'conn-badge on';
  document.getElementById('conn-badge').textContent = '● LIVE';
  log('Connected to server', 'ok');
});
socket.on('disconnect', () => {
  document.getElementById('conn-badge').className = 'conn-badge off';
  document.getElementById('conn-badge').textContent = '● OFFLINE';
  log('Disconnected from server', 'err');
});

socket.on('state', (state) => {
  updateScores(state.upper_taps || 0, state.lower_taps || 0);

  if (state.active && !gameActive) {
    gameActive = true;
    setUIActive(true);
    const elapsed = (Date.now() - state.started_at) / 1000;
    startLocalTimer(Math.round(state.duration - elapsed));
  }
  if (!state.active && !state.ended && gameActive) {
    gameActive = false;
    setUIActive(false);
  }
  if (!state.active && state.ended && gameActive) {
    gameActive = false;
    setUIActive(false);
    clearInterval(timerInterval);
    document.getElementById('d-timer-sub').textContent = 'race ended';
    log(`Race ended · White: ${state.upper_taps} · Purple: ${state.lower_taps}`, 'warn');
  }
});

function updateScores(u, l) {
  const total = u + l || 1;
  document.getElementById('d-upper').textContent = u;
  document.getElementById('d-lower').textContent = l;
  document.getElementById('bw').style.width = Math.round(u/total*100) + '%';
  document.getElementById('bp').style.width = Math.round(l/total*100) + '%';
  document.getElementById('pw').textContent = Math.round(u/total*100) + '%';
  document.getElementById('pp').textContent = Math.round(l/total*100) + '%';
  document.getElementById('d-total').textContent = u + l;
  document.getElementById('d-leader').textContent = u > l ? 'WHITE ↑' : l > u ? 'PURPLE ↑' : 'TIED';
  document.getElementById('d-margin').textContent = Math.abs(u - l);
}

function setUIActive(active) {
  document.getElementById('btn-start').disabled = active;
  document.getElementById('btn-stop').disabled = !active;
  document.getElementById('pill').className = 'pill ' + (active ? 'live' : 'idle');
  document.getElementById('pill-txt').textContent = active ? 'LIVE' : 'IDLE';
  document.getElementById('dur-row').style.opacity = active ? '0.3' : '1';
  document.getElementById('dur-row').style.pointerEvents = active ? 'none' : 'auto';
}

function startLocalTimer(remaining) {
  clearInterval(timerInterval);
  let r = remaining;
  document.getElementById('d-timer').textContent = r;
  document.getElementById('d-timer-sub').textContent = 'seconds remaining';
  document.getElementById('d-timer').style.color = '';
  timerInterval = setInterval(() => {
    r--;
    document.getElementById('d-timer').textContent = Math.max(0, r);
    if (r <= 10) document.getElementById('d-timer').style.color = '#E74C3C';
    if (r <= 0) clearInterval(timerInterval);
  }, 1000);
}

function setDur(s, btn) {
  duration = s;
  document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  log(`Duration set to ${s}s`);
}

function startGame() {
  socket.emit('director:start', { duration });
  log(`Starting race · ${duration}s`, 'info');
}

function stopGame() {
  socket.emit('director:stop');
  clearInterval(timerInterval);
  log('Race stopped manually', 'warn');
}

function resetGame() {
  socket.emit('director:reset');
  clearInterval(timerInterval);
  document.getElementById('d-timer').textContent = '—';
  document.getElementById('d-timer').style.color = '';
  document.getElementById('d-timer-sub').textContent = 'not started';
  log('Game reset', 'info');
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Newfoundland Regiment – Race Night</title>
<style>
  @font-face { font-family: 'NLRegiment'; src: url('/NLRegiment.otf') format('opentype'); }
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root { --navy:#0A2240; --maroon:#8A2432; --tan:#E0D0A6; --white:#FFFFFF; }
  html,body { height:100%; width:100%; background:var(--navy); font-family:'Barlow Condensed',sans-serif; color:var(--white); overflow:hidden; user-select:none; }
  #app { height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }

  #screen-select { display:flex; flex-direction:column; align-items:center; gap:20px; width:100%; text-align:center; }
  .nlr-logo { width:90px; filter:drop-shadow(0 0 18px rgba(138,36,50,0.5)); }
  .headline { font-family:'NLRegiment',sans-serif; font-size:36px; letter-spacing:2px; color:var(--white); }
  .tagline { font-size:12px; letter-spacing:4px; text-transform:uppercase; color:var(--tan); font-weight:700; }
  .divider { width:50px; height:2px; background:var(--maroon); margin:0 auto; }

  .bowl-btn { width:100%; padding:28px 20px; border-radius:3px; cursor:pointer; font-family:'NLRegiment',sans-serif; font-size:30px; letter-spacing:2px; transition:transform 0.1s; display:flex; flex-direction:column; align-items:center; gap:4px; outline:none; border:none; }
  .bowl-btn:active { transform:scale(0.97); }
  .blabel { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:4px; text-transform:uppercase; margin-bottom:2px; }
  .bowl-btn.wt { background:linear-gradient(135deg,#1a3560,#0f2040); border:2px solid rgba(224,208,166,0.35); color:var(--tan); }
  .bowl-btn.mt { background:linear-gradient(135deg,#6b1c27,#8A2432); border:2px solid rgba(224,208,166,0.25); color:var(--white); }

  #screen-waiting { display:none; flex-direction:column; align-items:center; gap:18px; text-align:center; }
  .wait-badge { width:86px; height:86px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'NLRegiment',sans-serif; font-size:12px; letter-spacing:1px; line-height:1.5; }
  .wait-badge.wt { background:rgba(255,255,255,0.05); border:2px solid rgba(224,208,166,0.35); color:var(--tan); }
  .wait-badge.mt { background:rgba(138,36,50,0.2); border:2px solid rgba(138,36,50,0.55); color:var(--white); }
  .wait-title { font-family:'NLRegiment',sans-serif; font-size:26px; letter-spacing:2px; color:var(--tan); }
  .wait-sub { font-size:12px; color:rgba(255,255,255,0.35); letter-spacing:2px; text-transform:uppercase; }
  .dots span { display:inline-block; animation:bdot 1.2s infinite; width:6px; height:6px; border-radius:50%; background:var(--maroon); margin:0 3px; vertical-align:middle; }
  .dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
  @keyframes bdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

  #screen-race { display:none; flex-direction:column; align-items:center; width:100%; height:100%; }
  .race-header { width:100%; display:flex; justify-content:space-between; align-items:center; padding:14px 0 10px; border-bottom:1px solid rgba(224,208,166,0.12); }
  .score-block { text-align:center; flex:1; }
  .score-lbl { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--tan); opacity:0.6; margin-bottom:1px; }
  .score-val { font-family:'NLRegiment',sans-serif; font-size:40px; line-height:1; }
  .score-val.wt { color:var(--tan); }
  .score-val.mt { color:#d05060; }
  .score-vs { font-family:'NLRegiment',sans-serif; font-size:13px; opacity:0.2; color:var(--tan); }

  .laps-row { width:100%; display:flex; justify-content:space-between; gap:10px; padding:10px 0 6px; }
  .lap-col { flex:1; }
  .lap-lbl { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--tan); opacity:0.5; margin-bottom:5px; }
  .lap-pips { display:flex; gap:5px; }
  .pip { flex:1; height:7px; border-radius:2px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1); transition:all .3s; }
  .pip.done.wt { background:var(--tan); border-color:var(--tan); box-shadow:0 0 8px rgba(224,208,166,0.5); }
  .pip.done.mt { background:var(--maroon); border-color:var(--maroon); box-shadow:0 0 8px rgba(138,36,50,0.6); }
  .pip.cur.wt { background:linear-gradient(90deg, var(--tan) var(--p,0%), rgba(255,255,255,0.08) var(--p,0%)); border-color:rgba(224,208,166,0.5); }
  .pip.cur.mt { background:linear-gradient(90deg, var(--maroon) var(--p,0%), rgba(255,255,255,0.06) var(--p,0%)); border-color:rgba(138,36,50,0.6); }

  .prog-wrap { width:100%; padding:4px 0 6px; }
  .prog-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .prog-row:last-child { margin-bottom:0; }
  .plbl { font-size:10px; letter-spacing:2px; color:var(--tan); opacity:0.5; width:24px; text-align:right; }
  .ptrack { flex:1; height:7px; background:rgba(255,255,255,0.06); border-radius:2px; overflow:hidden; }
  .pbar { height:100%; border-radius:2px; transition:width .3s; }
  .pbar.wt { background:linear-gradient(90deg,rgba(224,208,166,.4),var(--tan)); }
  .pbar.mt { background:linear-gradient(90deg,rgba(138,36,50,.6),#d05060); }

  .tap-area { flex:1; width:100%; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; }
  .tap-btn { width:186px; height:186px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; font-family:'NLRegiment',sans-serif; font-size:44px; letter-spacing:3px; position:relative; transition:transform .08s; border:3px solid; }
  .tap-btn:active,.tap-btn.pressed { transform:scale(0.90); }
  .tap-btn.wt { border-color:rgba(224,208,166,0.5); background:radial-gradient(circle,rgba(224,208,166,0.1),rgba(224,208,166,0.02)); color:var(--tan); box-shadow:0 0 50px rgba(224,208,166,0.1); }
  .tap-btn.mt { border-color:rgba(138,36,50,0.65); background:radial-gradient(circle,rgba(138,36,50,0.2),rgba(138,36,50,0.03)); color:#d05060; box-shadow:0 0 50px rgba(138,36,50,0.22); }
  .tap-sub { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:3px; opacity:0.5; text-transform:uppercase; }
  .ripple { position:absolute; border-radius:50%; width:186px; height:186px; border:2px solid currentColor; animation:rout .6s ease-out forwards; pointer-events:none; }
  @keyframes rout{0%{transform:scale(1);opacity:.7}100%{transform:scale(2.4);opacity:0}}
  .fp { position:absolute; top:-28px; font-family:'NLRegiment',sans-serif; font-size:24px; animation:fup .8s ease-out forwards; pointer-events:none; }
  @keyframes fup{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-45px)}}

  #screen-result { display:none; flex-direction:column; align-items:center; gap:18px; text-align:center; }
  .res-title { font-family:'NLRegiment',sans-serif; font-size:44px; letter-spacing:3px; }
  .res-sub { font-size:12px; color:rgba(255,255,255,0.4); letter-spacing:2px; text-transform:uppercase; }
  .res-scores { display:flex; gap:32px; }
  .rsc { text-align:center; }
  .rsc-lbl { font-size:10px; letter-spacing:3px; opacity:0.4; text-transform:uppercase; color:var(--tan); }
  .rsc-val { font-family:'NLRegiment',sans-serif; font-size:42px; }

  #conn-bar { position:fixed; bottom:0; left:0; right:0; padding:8px; text-align:center; font-size:11px; letter-spacing:1px; background:rgba(138,36,50,0.9); display:none; }
</style>
</head>
<body>
<div id="app">
  <div id="screen-select">
    <img class="nlr-logo" src="/nlr-logo.svg" alt="NLR">
    <div><div class="headline">RACE NIGHT</div><div class="tagline" style="margin-top:5px">Pick Your Side</div></div>
    <div class="divider"></div>
    <button class="bowl-btn wt" onclick="selectBowl('white')"><div class="blabel">Upper Bowl</div>WHITE TEAM</button>
    <button class="bowl-btn mt" onclick="selectBowl('maroon')"><div class="blabel">Lower Bowl</div>MAROON TEAM</button>
    <div style="font-size:10px;color:rgba(224,208,166,0.25);letter-spacing:2px">BETTER THAN THE BEST</div>
  </div>

  <div id="screen-waiting">
    <img class="nlr-logo" src="/nlr-logo.svg" alt="NLR">
    <div id="wait-badge" class="wait-badge wt">WHITE<br>TEAM</div>
    <div class="wait-title">YOU'RE IN!</div>
    <div class="wait-sub">Race starting soon</div>
    <div class="dots"><span></span><span></span><span></span></div>
    <div style="font-size:10px;color:rgba(224,208,166,0.25);letter-spacing:2px;margin-top:8px">GET READY TO TAP!</div>
  </div>

  <div id="screen-race">
    <div class="race-header">
      <div class="score-block"><div class="score-lbl">White</div><div class="score-val wt" id="su">0</div></div>
      <div class="score-vs">VS</div>
      <div class="score-block"><div class="score-lbl">Maroon</div><div class="score-val mt" id="sl">0</div></div>
    </div>
    <div class="laps-row">
      <div class="lap-col">
        <div class="lap-lbl">White Laps</div>
        <div class="lap-pips"><div class="pip wt" id="wl0"></div><div class="pip wt" id="wl1"></div><div class="pip wt" id="wl2"></div></div>
      </div>
      <div class="lap-col" style="text-align:right">
        <div class="lap-lbl">Maroon Laps</div>
        <div class="lap-pips"><div class="pip mt" id="ml0"></div><div class="pip mt" id="ml1"></div><div class="pip mt" id="ml2"></div></div>
      </div>
    </div>
    <div class="prog-wrap">
      <div class="prog-row"><div class="plbl">W</div><div class="ptrack"><div class="pbar wt" id="pu" style="width:0%"></div></div></div>
      <div class="prog-row"><div class="plbl">M</div><div class="ptrack"><div class="pbar mt" id="pl" style="width:0%"></div></div></div>
    </div>
    <div class="tap-area" id="tap-area">
      <div class="tap-btn wt" id="tap-btn">TAP<div class="tap-sub">As Fast As You Can</div></div>
    </div>
  </div>

  <div id="screen-result">
    <img class="nlr-logo" src="/nlr-logo.svg" alt="NLR">
    <div class="res-title" id="res-title">WHITE WINS!</div>
    <div class="divider"></div>
    <div class="res-sub" id="res-sub">Upper bowl takes it!</div>
    <div class="res-scores">
      <div class="rsc"><div class="rsc-lbl">White</div><div class="rsc-val" id="fw" style="color:var(--tan)">0</div></div>
      <div class="rsc"><div class="rsc-lbl">Maroon</div><div class="rsc-val" id="fm" style="color:#d05060">0</div></div>
    </div>
    <div style="font-size:10px;color:rgba(224,208,166,0.25);letter-spacing:2px;margin-top:6px">HONOUR THE PAST. INSPIRE THE FUTURE.</div>
  </div>
</div>
<div id="conn-bar">⚠ Reconnecting...</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let myBowl = null, gameActive = false, lastGameId = null;

socket.on('connect', () => document.getElementById('conn-bar').style.display = 'none');
socket.on('disconnect', () => document.getElementById('conn-bar').style.display = 'block');

function show(id) {
  ['screen-select','screen-waiting','screen-race','screen-result'].forEach(s => document.getElementById(s).style.display = 'none');
  document.getElementById(id).style.display = 'flex';
}
function selectBowl(b) {
  myBowl = b;
  const el = document.getElementById('wait-badge');
  el.className = 'wait-badge ' + (b === 'white' ? 'wt' : 'mt');
  el.innerHTML = b === 'white' ? 'WHITE<br>TEAM' : 'MAROON<br>TEAM';
  show('screen-waiting');
}

socket.on('state', s => {
  if (s.active) {
    if (s.game_id !== lastGameId) {
      lastGameId = s.game_id; gameActive = true;
      if (myBowl) {
        const cls = myBowl === 'white' ? 'wt' : 'mt';
        const btn = document.getElementById('tap-btn');
        btn.className = 'tap-btn ' + cls;
        btn.innerHTML = 'TAP<div class="tap-sub">As Fast As You Can</div>';
        show('screen-race');
      }
    }
    updateUI(s);
  }
  if (!s.active && s.ended && gameActive) { gameActive = false; showResult(s); }
  if (!s.active && !s.ended) gameActive = false;
});

function lapInfo(taps, tpl) {
  const done = Math.min(Math.floor(taps / tpl), 3);
  const pct = tpl > 0 ? Math.round((taps % tpl) / tpl * 100) : 0;
  return { done, pct };
}
function updateUI(s) {
  const u = s.upper_taps||0, l = s.lower_taps||0, tpl = s.taps_per_lap||50;
  document.getElementById('su').textContent = u;
  document.getElementById('sl').textContent = l;
  const wu = lapInfo(u, tpl), lu = lapInfo(l, tpl);
  for (let i=0;i<3;i++) {
    const wp = document.getElementById('wl'+i), mp = document.getElementById('ml'+i);
    wp.className = 'pip wt'; mp.className = 'pip mt';
    if (i < wu.done) wp.classList.add('done');
    else if (i === wu.done && wu.done < 3) { wp.classList.add('cur'); wp.style.setProperty('--p', wu.pct+'%'); }
    if (i < lu.done) mp.classList.add('done');
    else if (i === lu.done && lu.done < 3) { mp.classList.add('cur'); mp.style.setProperty('--p', lu.pct+'%'); }
  }
  document.getElementById('pu').style.width = wu.pct + '%';
  document.getElementById('pl').style.width = lu.pct + '%';
}
function showResult(s) {
  const u = s.upper_taps||0, l = s.lower_taps||0, draw = u===l, ww = u>l;
  document.getElementById('res-title').textContent = draw ? "IT'S A DRAW!" : ww ? 'WHITE WINS!' : 'MAROON WINS!';
  document.getElementById('res-title').style.color = draw ? '#fff' : ww ? 'var(--tan)' : '#d05060';
  document.getElementById('res-sub').textContent = draw ? 'What a race!' : ww ? 'Upper bowl takes it!' : 'Lower bowl takes it!';
  document.getElementById('fw').textContent = u;
  document.getElementById('fm').textContent = l;
  show('screen-result');
}
function handleTap() {
  if (!gameActive || !myBowl) return;
  socket.emit('tap', { bowl: myBowl === 'white' ? 'upper' : 'lower' });
  const btn = document.getElementById('tap-btn');
  btn.classList.add('pressed'); setTimeout(() => btn.classList.remove('pressed'), 80);
  const cl = myBowl === 'white' ? 'var(--tan)' : '#d05060';
  const r = document.createElement('div'); r.className = 'ripple'; r.style.color = cl;
  btn.appendChild(r); setTimeout(() => r.remove(), 600);
  const f = document.createElement('div'); f.className = 'fp'; f.textContent = '+1'; f.style.color = cl;
  document.getElementById('tap-area').appendChild(f); setTimeout(() => f.remove(), 800);
}
document.getElementById('tap-area').addEventListener('touchstart', e => { e.preventDefault(); handleTap(); }, { passive: false });
document.getElementById('tap-area').addEventListener('click', handleTap);
</script>
</body>
</html>
